name: Build and Push NEW Version Wheel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Fixed: checkout@v4 (v5 unstable)
    - name: Checkout source repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ✅ AUTO-INCREMENT setup.py BEFORE build tools
    - name: Increment setup.py version
      id: version
      run: |
        # Extract version from setup.py
        CURRENT_VERSION=$(grep -o 'version="[^"]*"' setup.py | sed 's/version="//;s/"$//')
        echo "Current version: $CURRENT_VERSION"
        
        # Split MAJOR.MINOR.PATCH → increment MINOR
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
        NEW_MINOR=$((MINOR + 1))
        NEW_VERSION="${MAJOR}.${NEW_MINOR}.0"
        
        # Update setup.py
        sed -i "s/version=\"[0-9.]*\"/version=\"$NEW_VERSION\"/" setup.py
        
        echo "New version: $NEW_VERSION"
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip build

    - name: Build NEW version wheel
      run: python -m build --wheel

    - name: Verify new wheel
      run: |
        ls -la dist/*.whl
        echo "✅ Built: datamart_gap_upsert_pipeline-${{ steps.version.outputs.version }}-py3-none-any.whl"

    # Fixed target repo checkout (v4)
    - name: Checkout target repo
      uses: actions/checkout@v4
      with:
        repository: bswsahoo11111/ingest-data-using-wheel-in-adb
        token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        path: target-repo

    - name: Move & commit
      run: |
        mkdir -p target-repo/dist-wheel
        cp dist/*.whl target-repo/dist-wheel/
        cp setup.py target-repo/  # Include updated setup.py
        
        cd target-repo
        git config user.name "bswsahoo11111"
        git config user.email "bswsahoo11111@gmail.com"
        git add dist-wheel/ setup.py
        git commit -m "v${{ steps.version.outputs.version }} [skip ci]" || echo "No changes"
        git push

    # Fixed Databricks upload
    - name: Install Databricks CLI
      run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

    - name: Upload to Databricks Volume
      env:
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      run: |
        WHEEL_FILE=$(ls dist/*.whl | head -n1)
        databricks fs cp $WHEEL_FILE dbfs:/Volumes/dataeng/dataeng/dataeng_vol/wheel/ --overwrite

        echo "✅ ${{ steps.version.outputs.version }} uploaded!"
